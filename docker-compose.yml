version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./whiteboard.db:/app/whiteboard.db
    environment:
      - DATABASE_URL=sqlite:///./whiteboard.db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
